appId: com.getjusto.dev6
productName: dev6
directories:
  output: release
files:
  - dist/**
  - dist-electron/**
asar: true
mac:
  category: public.app-category.productivity
  target:
    - dmg
    - zip
  hardenedRuntime: true
  gatekeeperAssess: false
publish:
  provider: s3
  bucket: ${env.DEV6_S3_BUCKET}
  region: ${env.DEV6_S3_REGION}
  path: dev6
